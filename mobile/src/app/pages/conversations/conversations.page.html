<ion-header>
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ selectedTitle || 'Conversaciones' }}</ion-title>
    <ion-buttons slot="end" *ngIf="selectedTitle">
      <ion-button (click)="close()">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-text color="danger" *ngIf="error">
    <p>{{ error }}</p>
  </ion-text>

  <ng-container *ngIf="!selectedTitle">
    <ion-list *ngIf="conversations.length; else empty">
      <ion-item *ngFor="let conv of conversations" button (click)="openConversation(conv)">
        <ion-label>
          <h2>{{ conv.title }}</h2>
          <p>{{ conv.updated_at | date:'short' }}</p>
        </ion-label>
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-item>
    </ion-list>
    <ng-template #empty>
      <p class="ion-text-center">No hay conversaciones aún.</p>
    </ng-template>
  </ng-container>

  <ng-container *ngIf="selectedTitle">
    <div *ngFor="let msg of selectedMessages" class="msg-item ion-margin-bottom">
      <ion-chip [color]="msg.role === 'user' ? 'primary' : 'medium'">{{ msg.role }}</ion-chip>
      <p>{{ msg.content }}</p>
    </div>
  </ng-container>
</ion-content>
