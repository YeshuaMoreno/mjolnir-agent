<ion-header>
  <ion-toolbar color="dark">
    <ion-title>MJÖLNIR — Seleccionar usuario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-text color="danger" *ngIf="error">
    <p>{{ error }}</p>
  </ion-text>

  <ion-list *ngIf="users.length > 0">
    <ion-list-header>Usuarios existentes</ion-list-header>
    <ion-item *ngFor="let user of users" button (click)="select(user)">
      <ion-label>
        <h2>{{ user.username }}</h2>
        <p>{{ user.email }}</p>
      </ion-label>
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-item>
  </ion-list>

  <ion-item-divider class="ion-margin-top">
    <ion-label>Crear nuevo usuario</ion-label>
  </ion-item-divider>

  <ion-item>
    <ion-label position="floating">Username</ion-label>
    <ion-input [(ngModel)]="newUsername" type="text"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="floating">Email</ion-label>
    <ion-input [(ngModel)]="newEmail" type="email"></ion-input>
  </ion-item>

  <ion-button expand="block" class="ion-margin-top" (click)="createAndSelect()">
    Crear y continuar
  </ion-button>
</ion-content>
