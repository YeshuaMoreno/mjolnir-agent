<ion-header>
  <ion-toolbar color="dark">
    <ion-title>MJÖLNIR</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col size="6">
        <ion-card button routerLink="/chat">
          <ion-card-content class="ion-text-center">
            <ion-icon name="chatbubbles-outline" size="large"></ion-icon>
            <p>Chat</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
      <ion-col size="6">
        <ion-card button routerLink="/conversations">
          <ion-card-content class="ion-text-center">
            <ion-icon name="list-outline" size="large"></ion-icon>
            <p>Conversaciones</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
      <ion-col size="6">
        <ion-card button routerLink="/tasks">
          <ion-card-content class="ion-text-center">
            <ion-icon name="checkmark-done-outline" size="large"></ion-icon>
            <p>Tareas</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
      <ion-col size="6">
        <ion-card button routerLink="/notes">
          <ion-card-content class="ion-text-center">
            <ion-icon name="document-text-outline" size="large"></ion-icon>
            <p>Notas</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
